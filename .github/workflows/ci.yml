name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,copilot,serve]"
          python -m pip install -r constraints-dev.txt

      - name: Run tests (README command)
        run: python -m pytest tests -q 2>&1 | tee ci_pytest_output.txt

      - name: Copilot golden conformance (offline)
        run: python -m pytest tests/test_copilot_golden.py -q

      - name: Engine smoke happy path
        run: python -m pytest tests/test_smoke_happy_path.py -q
