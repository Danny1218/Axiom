name: Copilot Milestone

on:
  push:
  pull_request:

jobs:
  copilot-milestone:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,copilot,serve]"
          python -m pip install -r constraints-dev.txt

      - name: Run Pytest
        run: pytest -q 2>&1 | Tee-Object -FilePath ci_pytest_output.txt

      - name: Upload pytest output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: copilot-milestone-pytest-output
          path: ci_pytest_output.txt

      - name: Run Draft Smoke
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\smoke_copilot_draft.ps1 `
            -Backend benchmark-dispatch `
            -OutJson benchmark_symbolic_snapshot_ci.json

      - name: Run Symbolic Benchmark
        run: |
          axiom copilot-benchmark `
            --backend benchmark-dispatch `
            --task-json benchmarks/copilot_symbolic_and_generalization_tasks.json `
            --out benchmark_symbolic_suite_ci.json `
            --gate

      - name: Run Next Symbolic Benchmark
        run: |
          axiom copilot-benchmark `
            --backend benchmark-dispatch `
            --task-json benchmarks/copilot_symbolic_next_milestone_tasks.json `
            --out benchmark_symbolic_suite_next_milestone_ci.json `
            --gate

      - name: Run Generalization Stress Benchmark
        run: |
          axiom copilot-benchmark `
            --backend benchmark-dispatch `
            --task-json benchmarks/copilot_symbolic_generalization_stress_tasks.json `
            --out benchmark_symbolic_suite_generalization_stress_ci.json `
            --gate

      - name: Run Robustness Ambiguity Stress Benchmark
        run: |
          axiom copilot-benchmark `
            --backend benchmark-dispatch `
            --task-json benchmarks/copilot_symbolic_robustness_ambiguity_stress_tasks.json `
            --out benchmark_symbolic_suite_robustness_ambiguity_stress_ci.json `
            --gate

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: copilot-benchmark-artifacts
          path: |
            benchmark_symbolic_snapshot_ci.json
            benchmark_symbolic_suite_ci.json
            benchmark_symbolic_suite_next_milestone_ci.json
            benchmark_symbolic_suite_generalization_stress_ci.json
            benchmark_symbolic_suite_robustness_ambiguity_stress_ci.json

      - name: Copilot golden conformance (offline)
        run: python -m pytest tests/test_copilot_golden.py -q

      - name: Engine smoke happy path
        run: python -m pytest tests/test_smoke_happy_path.py -q
